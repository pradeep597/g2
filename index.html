<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Speed Game</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #36d1dc, #5b86e5);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .game-box {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 400px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
    }

    #word {
        font-size: 28px;
        font-weight: bold;
        margin: 20px 0;
        color: #5b86e5;
    }

    #input {
        font-size: 18px;
    }

    .correct {
        color: green;
    }

    .wrong {
        color: red;
    }
</style>
</head>
<body>

<div class="game-box">
    <h3>⌨️ Typing Speed Game</h3>
    <p>Type the word before time runs out!</p>

    <div id="word">start</div>

    <input type="text" id="input" class="form-control mb-3" placeholder="Start typing..." autofocus>

    <p id="message"></p>

    <div class="d-flex justify-content-between">
        <span>⏱ Time: <b id="time">30</b>s</span>
        <span>🏆 Score: <b id="score">0</b></span>
    </div>

    <button class="btn btn-primary mt-3 w-100" onclick="startGame()">Start Game</button>
</div>

<script>
const words = ["python", "javascript", "html", "css", "bootstrap", "django", "react", "coding", "developer", "keyboard"];

let currentWord = "";
let score = 0;
let time = 30;
let timer;

// Generate random word
function randomWord() {
    return words[Math.floor(Math.random() * words.length)];
}

// Start game
function startGame() {
    score = 0;
    time = 30;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;
    document.getElementById("input").value = "";
    document.getElementById("message").innerText = "";

    currentWord = randomWord();
    document.getElementById("word").innerText = currentWord;

    clearInterval(timer);
    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            alert("⏳ Time Up! Your Score: " + score);
        }
    }, 1000);
}

// Typing check
document.getElementById("input").addEventListener("input", function() {
    let typed = this.value;

    if (typed === currentWord) {
        score++;
        document.getElementById("score").innerText = score;

        document.getElementById("message").innerText = "✔ Correct!";
        document.getElementById("message").className = "correct";

        this.value = "";
        currentWord = randomWord();
        document.getElementById("word").innerText = currentWord;
    } else {
        document.getElementById("message").innerText = "❌ Typing...";
        document.getElementById("message").className = "wrong";
    }
});
</script>

</body>
</html>
